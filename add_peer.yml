- name: New VPN Peer Provision
  hosts: all
  become: yes
  vars:
   # default variables
   peer_name: "default_client"
   peer_ip: "{{ vpn_subnet_prefix }}.2"
   device_type: "desktop"

  tasks:
   - name: Determine public IP address via external lookup
     ansible.builtin.uri:
      url: https://api.ipify.org
      return_content: yes
     register: public_ip_lookup
     changed_when: false

   - name: set public IP fact
     ansible.builtin.set_fact:
      server_public_ip: "{{ public_ip_lookup.content | trim }}"

   - name: Generate Peer Private Key in memory
     ansible.builtin.shell: wg genkey
     register: peer_priv_key
     changed_when: false
     check_mode: false #safe during dry run

   - name: Generate Peer Public Key from Private Key
     ansible.builtin.shell: echo "{{ peer_priv_key.stdout }}" | wg pubkey
     register: peer_pub_key
     changed_when: false
     check_mode: false #same

   - name: Fetch Server Public Key
     ansible.builtin.shell: wg show wg0 public-key
     register: server_pub_key
     changed_when: false
     check_mode: false #same

   - name: Register Peer with live WireGuard Server
     ansible.builtin.shell: |
      wg set wg0 peer {{ peer_pub_key.stdout }} allowed-ips {{ peer_ip }}/32,fd42:42:42::{{ peer_ip | split('.') | last }}/128
      wg-quick save wg0
     register: wg_sync
     changed_when: wg_sync.rc == 0
     #don't care about this one, let it skip

   - name: Ensure client ledger directory exists on the gateway
     ansible.builtin.file:
      path: /etc/wireguard/client_ledger
      state: directory
      owner: root
      group: root
      mode: '0700'

   - name: Record peer public key to the ledger
     ansible.builtin.copy:
      content: "{{ peer_pub_key.stdout }}"
      dest: "/etc/wireguard/client_ledger/{{ peer_name }}.pub"
      owner: root
      group: root
      mode: '0600'

   - name: Find all orphaned ghost peers (Garbage Collection)
     ansible.builtin.shell: |
      wg show wg0 allowed-ips | awk '$2 == "(none)" {print $1}' || true
     register: ghost_peers
     changed_when: false
     check_mode: false

   - name: Kick ghost peers from live interface
     ansible.builtin.shell: wg set wg0 peer {{ item }} remove
     loop: "{{ ghost_peers.stdout_lines }}"
     when: ghost_peers.stdout_lines | length > 0

   - name: save pristine interface state to disk
     ansible.builtin.shell: wg-quick save wg0
     when: ghost_peers.stdout_lines | length > 0

   - name: Ensure local vpn_clients directory exists
     ansible.builtin.file:
      path: /tmp/vpn_clients/{{ inventory_hostname }}
      state: directory
      mode: '0755'
     delegate_to: localhost
     become: no

   - name: Generate Local Client Config File
     ansible.builtin.template:
      src: templates/client.conf.j2
      dest: "/tmp/vpn_clients/{{ inventory_hostname }}/{{ peer_name }}.conf"
      mode: '0600'
      backup: yes
     delegate_to: localhost
     become: no

   - name: Generate QR Code for Mobile Devices
     ansible.builtin.shell: qrencode -t png -o "/tmp/vpn_clients/{{ inventory_hostname }}/{{ peer_name }}_qrcode.png" < "/tmp/vpn_clients/{{ inventory_hostname }}/{{ peer_name }}.conf"
     delegate_to: localhost
     become: no
     when: device_type == "mobile"
