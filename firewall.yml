- name: UFW configuration
  hosts: all
  become: yes

  tasks:
   - name: Ensure UFW is installed
     ansible.builtin.apt:
      name: ufw
      state: present

   - name: Set UFW default deny incoming, allow outgoing
     community.general.ufw:
      default: deny
      direction: incoming

   - name: Allow SSH traffic (port 22)
     community.general.ufw:
      rule: allow
      port: '22'
      proto: tcp
      src: '10.0.0.0/24'

   - name: Allow Wireguard traffic (Port 51820 or other)
     community.general.ufw:
      rule: allow
      port: '51820'
      proto: udp

   - name: Enable UFW and apply rules
     community.general.ufw:
      state: enabled
