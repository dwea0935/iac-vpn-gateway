- name: Security Playbook - Disable Password Auth, Removing Backdoors
  hosts: all
  become: yes #run as root

  tasks:
   - name: Disable Standard PasswordAuthentication
     ansible.builtin.lineinfile:
      path: /etc/ssh/sshd_config
      regexp: '^#?PasswordAuthentication'
      line: 'PasswordAuthentication no'
      state: present
     notify: Restart SSH

   - name: Disable KbdInteractiveAuthentication (PAM trap door)
     ansible.builtin.lineinfile:
       path: /etc/ssh/sshd_config
       regexp: '^#?KbdInteractiveAuthentication'
       line: 'KbdInteractiveAuthentication no'
       state: present
     notify: Restart SSH

   - name: Nuke cloud-init drop-in overrides (if exist)
     ansible.builtin.file:
       path: /etc/ssh/sshd_config.d/50-cloud-init.conf
       state: absent
     notify: Restart SSH

   - name: Remove public SSH access rule from UFW
     ansible.general.ufw:
      rule: allow
      port: '22'
      proto: tcp
      src: 'Anywhere'
      delete: yes

   - name: Harden UFW to only let traffic from the itnernal network via WireGuard subnet
     community.general.ufw:
      rule: allow
      port: '22'
      proto: tcp
      src: '10.0.0.0/24'

  handlers:
   - name: Restart SSH
     ansible.builtin.service:
      name: ssh
      state: restarted

   - name: Restart UFW
     ansible.builtin.service:
      name: ufw
      state: restarted
