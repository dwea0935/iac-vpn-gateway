- name: Bootstrap Automation User
  hosts: all
  become: yes
  vars:
   automation_user: "ansible"
   local_key_path: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519_ansible"

  tasks:
   - name: Generating ed25519 keypair locally for automation user
     ansible.builtin.command:
      cmd: ssh-keygen -t ed25519 -f "{{ local_key_path }}" -N "" -q
      creates: "{{ local_key_path }}"
     delegate_to: localhost
     become: no

   - name: Ensuring automation user exists
     ansible.builtin.user:
      name: "{{ automation_user }}"
      state: present
      shell: /bin/bash
      groups: sudo
      append: yes
      create_home: yes

   - name: Set authorized key for automation user
     ansible.builtin.authorized_key:
      user: "{{ automation_user }}"
      state: present
      key: "{{ lookup('file', local_key_path + '.pub') }}"

   - name: Grant passwordless sudo to automation user
     ansible.builtin.copy:
      dest: "/etc/sudoers.d/{{ automation_user }}"
      content: "{{ automation_user }} ALL=(ALL) NOPASSWD: ALL\n"
      mode: '0440'
      #critical: syntax validation before saving
      #if the syntax is wrong, it aborts, preventing from breaking sudo on the server
      validate: /usr/sbin/visudo -cf %s

   - name: Generate New Internal Inventory File
     ansible.builtin.template:
      src: templates/inventory_internal.ini.j2
      dest: ./inventory_internal.ini
     delegate_to: localhost
     become: no
