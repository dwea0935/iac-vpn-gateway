---
- name: Installing and Setting up dnsmasq
  hosts: all
  become: yes

  tasks:
   - name: Determine WireGuard IP assigned to wg0
     ansible.builtin.set_fact:
      listen_addr_wg: "{{ ansible_wg0.ipv4.address }}"

   - name: Disable systemd-resolved stub listener to free port 53
     ansible.builtin.lineinfile:
      path: /etc/systemd/resolved.conf
      regexp: '^#?DNSStubListener='
      line: 'DNSStubListener=no'
      state: present
     notify: Restart systemd-resolved

   - name: Ensure /etc/resolv.conf points to the real resolver
     ansible.builtin.file:
      src: /run/systemd/resolve/resolv.conf
      dest: /etc/resolv.conf
      state: link
      force: yes

   - name: Create systemd drop-in directory for dnsmasq
     ansible.builtin.file:
      path: /etc/systemd/system/dnsmasq.service.d
      state: directory
      mode: '0755'

   - name: Ensure dnsmasq waits for dnscrypt-proxy on boot
     ansible.builtin.copy:
      dest: /etc/systemd/system/dnsmasq.service.d/override.conf
      content: |
       [Unit]
       Requires=dnscrypt-proxy.service
       After=dnscrypt-proxy.service
      mode: '0644'
     notify: Reload systemd

   - name: Install dnsmasq
     ansible.builtin.apt:
      name: dnsmasq
      state: present
      update_cache: yes
      cache_valid_time: 3600

   - name: Generate dnsmasq.conf from Template
     ansible.builtin.template:
      src: templates/dnsmasq.conf.j2
      dest: /etc/dnsmasq.conf
      owner: root
      group: root
      mode: '0644'
     notify: Enable and Start dnsmasq

  handlers:
   - name: Enable and Start dnsmasq
     ansible.builtin.systemd:
      name: dnsmasq
      enabled: yes
      state: restarted

   - name: Restart systemd-resolved
     ansible.builtin.systemd:
      name: systemd-resolved
      state: restarted

   - name: Reload systemd
     ansible.builtin.systemd:
      daemon_reload: yes
