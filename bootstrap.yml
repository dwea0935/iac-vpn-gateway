- name: Bootstrap Automation User
  hosts: all
  become: yes
  vars:
   automation_user: "ansible"
   automation_pub_key: "put a public ed25519 key here"
   # This key is from this machine, for the future make sure to paste a generated key from the machine you want to run this on.

  tasks:
   - name: Ensuring aumtoamtion user exists
     ansible.builtin.user:
      name: "{{ automation_user }}"
      state: present
      shell: /bin/bash
      groups: sudo
      append: yes
      create_home: yes

   - name: Set authorized key for automation user
     ansible.builtin.authorized_key:
      user: "{{ automation_user }}"
      state: present
      key: "{{ automation_pub_key }}"

   - name: Grant passwordless sudo to aumtomation user
     ansible.builtin.copy:
      dest: "/etc/sudoers.d/{{ automation_user }}"
      content: "{{ automation_user }} ALL=(ALL) NOPASSWD: ALL\n"
      mode: '0440'
      #critical: syntax validation before saving
      #if the syntax is wrong, it aborts, preventing from breaking sudo on the server
      validate: /usr/sbin/visudo -cf %s
